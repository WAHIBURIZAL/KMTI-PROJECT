{% extends 'pemilwa/base.html' %}
{% load static %}
{% block title %}Login{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
<div class="login-wrapper">
    <div class="row justify-content-center w-100">
        <div class="col-md-4">
            <div class="card">
            <div class="card-header" style="background: linear-gradient(135deg, #A09323 0%, #DED479 100%) !important; padding: 32px 24px !important; display: block !important;">
                <h4 style="color: #2f2f2f !important; font-weight: 800 !important; margin: 0 !important;">LOGIN PEMILIHAN KAHIM</h4>
            </div>

                <div class="card-body">

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label for="nim" class="form-label">
                                NIM
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                id="nim"
                                name="nim"
                                placeholder="Masukkan NIM"
                                required
                            >
                        </div>

                        <div class="mb-4">
                            <label for="token" class="form-label">
                                Token
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                id="token"
                                name="token"
                                placeholder="Masukkan Token"
                                required
                            >
                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100"
                        >
                            Login
                        </button>

                    </form>

                </div>

                <div class="card-footer">
                    Gunakan NIM dan token yang diberikan panitia
                </div>

            </div>

        </div>
    </div>
</div>

{% endblock %}
